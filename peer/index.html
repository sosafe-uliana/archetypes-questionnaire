<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Peer Evaluation — Engineering Leadership Archetypes</title>
  <script>
    // Redirect to the root app with peer mode pre-selected.
    // Passes through ?subject=Name so the subject field is locked.
    var sp      = new URLSearchParams(window.location.search);
    var subject = sp.get('subject');
    var key     = sp.get('key');
    var base    = window.location.href.replace(/peer\/?([?#].*)?$/, '');
    var target  = base + '?mode=peer';
    if (subject) target += '&subject=' + encodeURIComponent(subject);
    if (key)     target += '&key='     + encodeURIComponent(key);
    window.location.replace(target);
  </script>
</head>
<body></body>
</html>
